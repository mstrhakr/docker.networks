name: "Build and Release"

on:
  push:
    branches:
      - main
    paths:
      - 'source/docker.networks/**'
      - 'source/pkg_build.sh'
      - 'docker.networks.plg'
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_TZ: "America/Detroit"

jobs:
  build-and-release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.actor != 'github-actions[bot]' &&
        !contains(github.event.head_commit.message, '[no ci]') &&
        !contains(github.event.head_commit.message, '[skip ci]')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli shellcheck

      - name: Compute release version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          export TZ="${RELEASE_TZ}"
          version="$(date +'%Y.%m.%d.%H%M')"
          tag="v${version}"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          echo "Using version: ${version}"
          echo "Using tag: ${tag}"

      - name: Generate changelog
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.meta.outputs.version }}"
          NEW_TAG="${{ steps.meta.outputs.tag }}"
          LAST_TAG=$(git tag --merged HEAD -l 'v*' | sort -V | tail -1)

          if [[ -n "$LAST_TAG" ]]; then
            echo "Changes since $LAST_TAG"
            RANGE="${LAST_TAG}..HEAD"
          else
            echo "No previous tag found — using all commits"
            RANGE="HEAD"
          fi

          declare -A CATEGORIES=(
            [feat]="Features"
            [fix]="Bug Fixes"
            [perf]="Performance"
            [refactor]="Refactoring"
            [docs]="Documentation"
            [test]="Tests"
            [build]="Build"
            [ci]="CI/CD"
            [chore]="Chores"
          )
          ORDER=(feat fix perf refactor docs test build ci chore)

          declare -A BUCKET
          UNCATEGORIZED=""

          while IFS= read -r subject; do
            [[ -z "$subject" ]] && continue
            [[ "$subject" =~ ^Merge\  ]] && continue
            [[ "$subject" =~ ^Release\ v ]] && continue
            [[ "$subject" =~ ^\[skip\ ci\] ]] && continue
            [[ "$subject" =~ ^\[no\ ci\] ]] && continue
            [[ "$subject" =~ ^chore:\ sync\ PLG\ for\ v ]] && continue
            [[ "$subject" =~ ^v[0-9]{4}\. ]] && continue

            CONV_RE='^([a-z]+)(\([^)]+\))?:[[:space:]](.+)$'
            if [[ "$subject" =~ $CONV_RE ]]; then
              TYPE="${BASH_REMATCH[1]}"
              SCOPE="${BASH_REMATCH[2]}"
              MSG="${BASH_REMATCH[3]}"
              LABEL="${CATEGORIES[$TYPE]:-$TYPE}"
              if [[ -n "$SCOPE" ]]; then
                LINE="- ${LABEL} ${SCOPE}: ${MSG}"
              else
                LINE="- ${LABEL}: ${MSG}"
              fi
              BUCKET[$TYPE]+="${LINE}"$'\n'
            else
              UNCATEGORIZED+="- ${subject}"$'\n'
            fi
          done < <(git log "$RANGE" --pretty=format:"%s" --no-merges)

          NOTES="###${VERSION}"$'\n'
          HAS_CONTENT=false

          for TYPE in "${ORDER[@]}"; do
            if [[ -n "${BUCKET[$TYPE]:-}" ]]; then
              NOTES+="${BUCKET[$TYPE]}"
              HAS_CONTENT=true
            fi
          done

          if [[ -n "$UNCATEGORIZED" ]]; then
            NOTES+="$UNCATEGORIZED"
            HAS_CONTENT=true
          fi

          if [[ "$HAS_CONTENT" == false ]]; then
            NOTES+="- Minor updates and improvements"$'\n'
          fi

          if [[ -n "$LAST_TAG" ]]; then
            NOTES+="- [View all changes](https://github.com/${{ github.repository }}/compare/${LAST_TAG}...${NEW_TAG})"$'\n'
          fi

          printf '%s\n' "$NOTES" > /tmp/docker-networks-changelog.txt

          cat > /tmp/docker-networks-release-body.md <<EOF
          ## Docker Networks v${VERSION}

          ${NOTES}

          ### Manual Install

          **Via Unraid Plugin Manager (Install Plugin):**
          ```
          https://raw.githubusercontent.com/${{ github.repository }}/main/docker.networks.plg
          ```

          ### Release Assets
          - `docker.networks.plg`
          - `docker.networks-*-noarch-*.txz`
          EOF

          echo "Changelog:"
          cat /tmp/docker-networks-changelog.txt

      - name: Update PLG changelog
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PYEOF'
          import html
          import pathlib
          import re

          plg_path = pathlib.Path('docker.networks.plg')
          notes_path = pathlib.Path('/tmp/docker-networks-changelog.txt')

          notes = notes_path.read_text()
          escaped = html.escape(notes.rstrip('\n'))
          content = plg_path.read_text()
          pattern = r'(<CHANGES>\n).*?(\n</CHANGES>)'
          replacement = r'\1' + escaped + r'\2'
          updated = re.sub(pattern, replacement, content, flags=re.DOTALL)
          plg_path.write_text(updated)
          PYEOF

      - name: Build package
        shell: bash
        run: |
          set -euo pipefail
          chmod +x build.sh build_in_docker.sh test.sh source/pkg_build.sh
          ./build.sh -Version "${{ steps.meta.outputs.version }}"

      - name: Verify artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -lah archive
          test -f archive/docker.networks.plg
          compgen -G "archive/docker.networks-*-noarch-*.txz" > /dev/null

      - name: Collect package metadata
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          package_path=$(ls -1 archive/docker.networks-*-noarch-*.txz | head -n1)
          package_file=$(basename "$package_path")
          package_md5=$(md5sum "$package_path" | awk '{print $1}')

          # Expected format: docker.networks-<version>-noarch-<build>.txz
          package_build=$(echo "$package_file" | sed -E 's/^docker\.networks-[^-]+-noarch-([0-9]+)\.txz$/\1/')
          if [[ -z "$package_build" || "$package_build" == "$package_file" ]]; then
            export TZ="${RELEASE_TZ}"
            package_build=$(date +'%H%M')
          fi

          echo "file=$package_file" >> "$GITHUB_OUTPUT"
          echo "md5=$package_md5" >> "$GITHUB_OUTPUT"
          echo "build=$package_build" >> "$GITHUB_OUTPUT"

          echo "Package: $package_file"
          echo "MD5: $package_md5"
          echo "Build: $package_build"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body_path: /tmp/docker-networks-release-body.md
          files: |
            archive/docker.networks.plg
            archive/docker.networks-*-noarch-*.txz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout main for PLG sync
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync root PLG with release metadata
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          BUILD="${{ steps.pkg.outputs.build }}"
          MD5="${{ steps.pkg.outputs.md5 }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Clean checkout above should avoid dirty-worktree conflicts.
          git pull --rebase origin main

          sed -i \
            -e "s|<!ENTITY version.*\".*\"|<!ENTITY version     \"${VERSION}\"|" \
            -e "s|<!ENTITY packageMD5.*\".*\"|<!ENTITY packageMD5  \"${MD5}\"|" \
            -e "s|<!ENTITY pkgBUILD.*\".*\"|<!ENTITY pkgBUILD    \"${BUILD}\"|" \
            docker.networks.plg

          python3 - <<'PYEOF'
          import html
          import pathlib
          import re

          plg_path = pathlib.Path('docker.networks.plg')
          notes_path = pathlib.Path('/tmp/docker-networks-changelog.txt')

          notes = notes_path.read_text()
          escaped = html.escape(notes.rstrip('\n'))
          content = plg_path.read_text()
          pattern = r'(<CHANGES>\n).*?(\n</CHANGES>)'
          replacement = r'\1' + escaped + r'\2'
          updated = re.sub(pattern, replacement, content, flags=re.DOTALL)
          plg_path.write_text(updated)
          PYEOF

          git add docker.networks.plg
          if git diff --cached --quiet; then
            echo "No PLG changes to commit"
            exit 0
          fi

          git commit -m "chore: sync PLG for v${VERSION} [no ci]"
          git push origin HEAD:main
