name: "Build and Release"

on:
  push:
    branches:
      - main
    paths:
      - 'source/docker.networks/**'
      - 'source/pkg_build.sh'
      - 'docker.networks.plg'
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_TZ: "America/Detroit"

jobs:
  build-and-release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.actor != 'github-actions[bot]' &&
        !contains(github.event.head_commit.message, '[no ci]') &&
        !contains(github.event.head_commit.message, '[skip ci]')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli shellcheck

      - name: Compute release version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          export TZ="${RELEASE_TZ}"
          version="$(date +'%Y.%m.%d.%H%M')"
          tag="v${version}"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          echo "Using version: ${version}"
          echo "Using tag: ${tag}"

      - name: Build package
        shell: bash
        run: |
          set -euo pipefail
          chmod +x build.sh build_in_docker.sh test.sh source/pkg_build.sh
          ./build.sh -Version "${{ steps.meta.outputs.version }}"

      - name: Verify artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -lah archive
          test -f archive/docker.networks.plg
          compgen -G "archive/docker.networks-*-noarch-*.txz" > /dev/null

      - name: Collect package metadata
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          package_path=$(ls -1 archive/docker.networks-*-noarch-*.txz | head -n1)
          package_file=$(basename "$package_path")
          package_md5=$(md5sum "$package_path" | awk '{print $1}')

          # Expected format: docker.networks-<version>-noarch-<build>.txz
          package_build=$(echo "$package_file" | sed -E 's/^docker\.networks-[^-]+-noarch-([0-9]+)\.txz$/\1/')
          if [[ -z "$package_build" || "$package_build" == "$package_file" ]]; then
            export TZ="${RELEASE_TZ}"
            package_build=$(date +'%H%M')
          fi

          echo "file=$package_file" >> "$GITHUB_OUTPUT"
          echo "md5=$package_md5" >> "$GITHUB_OUTPUT"
          echo "build=$package_build" >> "$GITHUB_OUTPUT"

          echo "Package: $package_file"
          echo "MD5: $package_md5"
          echo "Build: $package_build"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body: |
            ## Docker Networks v${{ steps.meta.outputs.version }}

            ### Manual Install

            **Via Unraid Plugin Manager (Install Plugin):**
            ```
            https://raw.githubusercontent.com/${{ github.repository }}/main/docker.networks.plg
            ```

            ### Release Assets
            - `docker.networks.plg`
            - `docker.networks-*-noarch-*.txz`
          files: |
            archive/docker.networks.plg
            archive/docker.networks-*-noarch-*.txz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout main for PLG sync
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync root PLG with release metadata
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          BUILD="${{ steps.pkg.outputs.build }}"
          MD5="${{ steps.pkg.outputs.md5 }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Clean checkout above should avoid dirty-worktree conflicts.
          git pull --rebase origin main

          sed -i \
            -e "s|<!ENTITY version.*\".*\"|<!ENTITY version     \"${VERSION}\"|" \
            -e "s|<!ENTITY packageMD5.*\".*\"|<!ENTITY packageMD5  \"${MD5}\"|" \
            -e "s|<!ENTITY pkgBUILD.*\".*\"|<!ENTITY pkgBUILD    \"${BUILD}\"|" \
            docker.networks.plg

          git add docker.networks.plg
          if git diff --cached --quiet; then
            echo "No PLG changes to commit"
            exit 0
          fi

          git commit -m "chore: sync PLG for v${VERSION} [no ci]"
          git push origin HEAD:main
