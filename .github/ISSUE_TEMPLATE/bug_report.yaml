name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below to help us investigate.
        Before reporting UI issues, do a hard refresh with [CTRL]+[SHIFT]+[R].

  - type: input
    id: version
    attributes:
      label: Plugin Version
      description: What docker.networks version are you running?
      placeholder: "e.g., latest, 2026-06-09"
    validations:
      required: true

  - type: input
    id: unraid_version
    attributes:
      label: Unraid Version
      description: Which Unraid version are you running?
      placeholder: "e.g., 6.12.13, 7.2.3"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the problem.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe expected behavior...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant logs (plugin log, browser console, API response).
      render: shell

  - type: textarea
    id: docker_network_config
    attributes:
      label: Network/Container Context
      description: Share relevant network details (drivers, subnets, attached containers). Redact sensitive values.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add screenshots or any extra details.