# Docker Networks Plugin Configuration

# Enable or disable the plugin.
ENABLED="1"

# Auto-refresh interval in seconds (frontend polling).
REFRESH_INTERVAL="30"

# Log file location.
LOG_FILE="/var/log/docker-networks.log"

# Whether to log API calls.
LOG_API_CALLS="0"

# Enable debug-level logs in syslog/UI logger.
DEBUG_TO_LOG="false"

# Preferred menu location: Docker or Tools.
# Current page file is registered under Docker by default.
MENU_LOCATION="Docker"
